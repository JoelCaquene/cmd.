{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login Profissional - cmb</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #00a859; 
            --secondary: #ffcc00; 
            --dark: #1a1a1a;
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.5);
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* Mesmo fundo gradiente da página de cadastro */
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 50%, #94a3b8 100%);
            color: var(--dark);
        }

        /* BARRA SUPERIOR */
        .top-nav {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            box-sizing: border-box;
            z-index: 10;
        }

        /* ESTILO EMBELEZADO CMB (IGUAL AO CADASTRO) */
        .logo-img {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -2px;
            text-transform: lowercase;
            background: linear-gradient(to bottom, #00a859, #007d42);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.1));
        }

        .nav-link-register {
            text-decoration: none;
            color: #1a202c;
            font-weight: 700;
            font-size: 0.85em;
            padding: 8px 18px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            transition: 0.3s;
        }

        /* CONTAINER LOGIN COM EFEITO VIDRO */
        .login-container {
            margin-top: 40px;
            margin-bottom: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 25px;
            border-radius: 30px;
            width: 92%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid var(--glass-border);
            text-align: center;
            box-sizing: border-box;
            z-index: 5;
        }

        h2 {
            font-weight: 800;
            font-size: 1.6rem;
            margin-bottom: 30px;
            color: #1a202c;
        }

        /* CAMPOS DE FORMULÁRIO COM VIDRO */
        .form-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 800;
            margin-bottom: 8px;
            margin-left: 5px;
            display: block;
            color: #4a5568;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .input-wrapper i.main-icon {
            position: absolute;
            left: 18px;
            color: var(--primary);
            font-size: 1.1rem;
            z-index: 5;
        }

        /* Estilização para o widget do Django {{ form.username }} e {{ form.password }} */
        .auth-form input {
            width: 100%;
            padding: 16px 15px 16px 52px;
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            outline: none;
            box-sizing: border-box;
            color: #1a202c;
        }

        .auth-form input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 15px rgba(0, 168, 89, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 18px;
            cursor: pointer;
            color: #718096;
            z-index: 5;
        }

        /* BOTÃO ENTRAR */
        .submit-button {
            width: 100%;
            padding: 18px;
            margin-top: 10px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, #00a859 0%, #008f4c 100%);
            color: white;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0, 168, 89, 0.3);
            transition: 0.3s;
        }

        .submit-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(0, 168, 89, 0.4);
        }

        /* ERROS */
        .errorlist {
            list-style: none;
            padding: 12px;
            margin-bottom: 20px;
            background: rgba(255, 77, 79, 0.1);
            border-radius: 10px;
            color: #d32f2f;
            font-size: 0.85rem;
            text-align: left;
            border: 1px solid rgba(255, 77, 79, 0.2);
        }

        @media (max-width: 480px) {
            .login-container { 
                padding: 30px 20px; 
                width: 95%;
            }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo-img">cmb</div>
        <a href="{% url 'cadastro' %}" class="nav-link-register">Criar Conta</a>
    </nav>

    <div class="login-container">
        <div class="header">
            <h2>Bem-vindo</h2>
        </div>
        
        <form method="post" class="auth-form">
            {% csrf_token %}

            {% if form.non_field_errors %}
                <ul class="errorlist">
                    {% for error in form.non_field_errors %}
                        <li><i class="fas fa-circle-exclamation"></i> {{ error }}</li>
                    {% endfor %}
                </ul>
            {% endif %}

            <div class="form-group">
                <label>Número de Telefone</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-phone-flip main-icon"></i>
                    {{ form.username }}
                </div>
            </div>
            
            <div class="form-group">
                <label>Senha de Acesso</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-shield-halved main-icon"></i>
                    {{ form.password }}
                    <i class="fa-regular fa-eye toggle-password" id="togglePassword"></i>
                </div>
            </div>
            
            <button type="submit" class="submit-button">
                <span>Entrar</span>
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Lógica para mostrar/esconder senha
            const togglePassword = document.querySelector('#togglePassword');
            const passwordInput = document.querySelector('input[name="password"]');

            if (togglePassword && passwordInput) {
                togglePassword.addEventListener('click', function() {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    this.classList.toggle('fa-eye');
                    this.classList.toggle('fa-eye-slash');
                });
            }

            // Inserindo Placeholders nos campos gerados pelo Django
            const phoneInput = document.querySelector('input[name="username"]');
            if (phoneInput) phoneInput.setAttribute('placeholder', 'Seu número');
            
            const passInput = document.querySelector('input[name="password"]');
            if (passInput) passInput.setAttribute('placeholder', 'Sua senha');
        });
    </script>
</body>
</html>
